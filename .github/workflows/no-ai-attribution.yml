name: No AI Attribution

# Enforces the repository rule (see AGENTS.md / CONTRIBUTING.md): commit messages
# must not carry `Co-Authored-By` trailers for AI tools — attribution stays limited
# to human contributors.
#
# This checks BOTH the PR's commits AND the PR title/body, because GitHub composes
# the squash-merge commit message from the PR title and body. A local commit-msg
# hook cannot catch that path, so the authoritative gate lives here in CI.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  no-ai-attribution:
    name: No AI Co-Authored-By trailers
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Reject AI Co-Authored-By trailers
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # A Co-Authored-By trailer pointing at a known AI assistant. Case-insensitive.
          # Curated list of tool names + the GitHub "[bot]" suffix convention; this
          # intentionally does NOT match human co-authors.
          AI_PATTERN='co-authored-by:.*(claude|anthropic|copilot|chatgpt|openai|gpt-[0-9]|\bgemini\b|cursor|codeium|windsurf|devin|tabnine|amazon q|sourcegraph|cody|\[bot\])'

          FAILED=0

          report() { # source  line
            echo "::error::AI Co-Authored-By trailer not allowed ($1): $2"
            FAILED=1
          }

          # ── PR commits ───────────────────────────────────────────────────────
          # Scan full commit messages (trailers live in the body). Merge commits skipped.
          while IFS= read -r line; do
            if echo "$line" | grep -qiE "$AI_PATTERN"; then
              report "commit" "$line"
            fi
          done < <(git log --no-merges --format='%B' "$BASE_SHA".."$HEAD_SHA")

          # ── PR title + body (the squash-merge message source) ──────────────────
          while IFS= read -r line; do
            if echo "$line" | grep -qiE "$AI_PATTERN"; then
              report "PR description" "$line"
            fi
          done < <(printf '%s\n%s\n' "$PR_TITLE" "$PR_BODY")

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "Remove the AI Co-Authored-By trailer(s). Attribution must be limited to"
            echo "human contributors. See AGENTS.md / CONTRIBUTING.md."
            echo ""
            echo "If the trailer is in a commit, amend/rebase to drop it:"
            echo "  git rebase -i \$BASE_SHA   # reword the offending commit(s)"
            echo "If it is in the PR description, edit the PR title/body to remove it."
            exit 1
          fi

          echo "ok: no AI Co-Authored-By trailers found in commits or PR description"
